<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Moreve | BOTTOM</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Noto+Sans+KR:wght@300;400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-inner">
    <div class="logo">
      <a href="index.html"><img src="images/logo.png" alt="Moreve"></a>
    </div>
    <nav class="gnb">
      <a href="outer.html">OUTER</a>
      <a href="top.html">TOP</a>
      <a href="dress.html">DRESS</a>
      <a href="bottom.html">BOTTOM</a>
    </nav>
    <div class="util">
      <a href="#">로그인</a>
      <a href="#">회원가입</a>
      <a href="#" class="cart">CART <span class="num">0</span></a>
    </div>
  </div>
</header>

<!-- BOTTOM BANNER -->
<section class="cat-banner cat-banner-bottom">
  <div class="cat-banner-overlay"></div>
  <div class="cat-banner-text">
    <p class="cat-sub">MOREVE 2026 SPRING</p>
    <h1 class="cat-title">Bottom.</h1>
    <p class="cat-desc">편안함과 스타일을 모두 담은<br>모어브의 보텀 컬렉션</p>
  </div>
</section>

<!-- 상품 리스트 -->
<section class="cat-products">
  <div class="cat-products-head">
    <p class="cat-count">전체 <span>6</span></p>
    <select class="cat-sort">
      <option>신상품순</option>
      <option>인기순</option>
      <option>낮은 가격순</option>
      <option>높은 가격순</option>
    </select>
  </div>

  <div class="product-grid">
    <a href="product.html" class="product">
      <div class="product-img pi7"></div>
      <div class="product-name">와이드 슬랙스</div>
      <div class="product-price">92,000원</div>
    </a>
    <a href="product.html" class="product">
      <div class="product-img pi8"></div>
      <div class="product-name">데님 스트레이트 팬츠</div>
      <div class="product-price">88,000원</div>
    </a>
    <a href="product.html" class="product">
      <div class="product-img pi15"></div>
      <div class="product-name">코튼 와이드 팬츠</div>
      <div class="product-price">88,000원</div>
    </a>
    <a href="product.html" class="product">
      <div class="product-img pi16"></div>
      <div class="product-name">A라인 미디 스커트</div>
      <div class="product-price">78,000원</div>
    </a>
    <a href="product.html" class="product">
      <div class="product-img pi23"></div>
      <div class="product-name">플리츠 롱 스커트</div>
      <div class="product-price">98,000원</div>
    </a>
    <a href="product.html" class="product">
      <div class="product-img pi24"></div>
      <div class="product-name">벨티드 미디 스커트</div>
      <div class="product-price">88,000원</div>
    </a>
  </div>
</section>

</body>
</html>
