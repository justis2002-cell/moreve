<!DOCTYPE html>
<html lang="ko">
<head>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header class="header">

  <div class="header-inner">
    <div class="logo">
      <a href="index.html"><img src="images/logo.png" alt="Moreve"></a>
    </div>
    <nav class="gnb">
      <a href="outer.html">OUTER</a>
      <a href="top.html">TOP</a>
      <a href="dress.html">DRESS</a>
      <a href="bottom.html">BOTTOM</a>

    <div class="util">

      <a href="#" class="cart">CART <span class="num">0</span></a>
    </div>
  </div>
</header>

<!-- OUTER BANNER -->
<section class="cat-banner">
  <div class="cat-banner-img"></div>
  <div class="cat-banner-overlay"></div>
  <div class="cat-banner-text">
    <p class="cat-sub">MOREVE 2026 SPRING</p>

  </div>
</section>

<!-- 상품 리스트 -->
<section class="cat-products">
  <div class="cat-products-head">
    <p class="cat-count">전체 <span>6</span></p>
    <select class="cat-sort">
      <option>신상품순</option>
      <option>인기순</option>

      <option>높은 가격순</option>
    </select>

  <div class="product-grid">
    <a href="product.html" class="product">
      <div class="product-img pi1"></div>
      <div class="product-name">롱 트렌치 코트</div>
      <div class="product-price">189,000원</div>

    <a href="product.html" class="product">
      <div class="product-img pi2"></div>
      <div class="product-name">숏 울 자켓</div>
      <div class="product-price">258,000원</div>

      <div class="product-name">린넨 블레이저</div>
      <div class="product-price">158,000원</div>

    <a href="product.html" class="product">
      <div class="product-img pi17"></div>

      <div class="product-price">228,000원</div>

    <a href="product.html" class="product">
      <div class="product-img pi18"></div>
      <div class="product-name">체크 블레이저</div>
      <div class="product-price">168,000원</div>
    </a>
  </div>
</section>

</html>
